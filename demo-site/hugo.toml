baseURL = 'https://realmnzn.github.io/hugo-Atmosphere/'
languageCode = 'en'
title = "Atmosphere Demo"
theme = 'atmosphere'

[taxonomies]
  tag = 'tags'

[markup]
  [markup.highlight]
    noClasses = false
    guessSyntax = true
    tabWidth = 4
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[pagination]
  pagerSize = 10

[outputs]
  home = ['HTML', 'RSS', 'JSON']
  section = ['HTML', 'RSS']

[params]
  author = 'Mnzn'
  description = 'Atmosphere theme demo site.'
  github = 'realmnzn'
  travellingURL = 'https://www.travellings.cn/train'
