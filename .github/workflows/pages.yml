name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.153.2'
          extended: true

      - name: Build demo site
        run: |
          mkdir -p demo/themes/atmosphere
          cp -r layouts assets archetypes theme.toml demo/themes/atmosphere/
          mkdir -p demo/themes/atmosphere/static demo/themes/atmosphere/i18n
          cp demo-site/hugo.toml demo/
          cp -r demo-site/content demo/
          cp -r demo-site/data demo/
          cd demo && hugo --minify --baseURL "https://realmnzn.github.io/hugo-Atmosphere/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
