{{ define "main" }}
<div class="container">
  <header class="list-header">
    <h1 class="list-title">{{ .Title }}</h1>
  </header>
  {{ range .Site.Data.friends.list }}
  <section class="friends-section">
    <h2 class="friends-group-title">{{ .group }}</h2>
    <div class="friends-grid">
      {{ range .items }}
      <a href="{{ .url }}" class="friend-card" target="_blank" rel="noopener">
        <span class="friend-name">{{ .name }}</span>
        {{ with .desc }}<span class="friend-desc">{{ . }}</span>{{ end }}
      </a>
      {{ end }}
    </div>
  </section>
  {{ end }}
</div>
{{ end }}

{{ define "styles" }}
{{ $friends := resources.Get "css/friends.css" }}
<link rel="stylesheet" href="{{ $friends.RelPermalink }}">
{{ end }}
