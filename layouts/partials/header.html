<header class="site-header">
  <div class="container header-inner">
    <nav class="site-nav">
      <a href="{{ site.Home.RelPermalink }}" class="nav-link{{ if .IsHome }} is-active{{ end }}">Home</a>
      <a href="{{ "posts/" | relURL }}" class="nav-link{{ if eq .Section "posts" }} is-active{{ end }}">Archive</a>
      {{ with .Site.Params.travellingURL }}<a href="{{ . }}" class="nav-link" target="_blank" rel="noopener">Travelling</a>{{ end }}
      <a href="{{ "friends/" | relURL }}" class="nav-link{{ if eq .Title "Links" }} is-active{{ end }}">Links</a>
      <a href="{{ "about/" | relURL }}" class="nav-link{{ if eq .Title "About" }} is-active{{ end }}">About</a>
    </nav>
    <div class="header-actions">
      <button class="search-btn" id="search-btn" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <button class="scene-toggle" id="scene-toggle" aria-label="Toggle scene">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-rain" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 17.58A5 5 0 0 0 18 8h-1.26A8 8 0 1 0 4 16.25"/>
          <line x1="8" y1="16" x2="8" y2="20"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="16" y1="16" x2="16" y2="20"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<!-- Search overlay -->
<div class="search-overlay" id="search-overlay">
  <div class="search-container">
    <div class="search-input-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" class="search-input" id="search-input" placeholder="Search posts..." autocomplete="off">
      <kbd class="search-kbd">Esc</kbd>
    </div>
    <div class="search-results" id="search-results"></div>
  </div>
</div>
