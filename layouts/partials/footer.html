            <span>&copy; {{ with .Site.Params.startYear }}{{ . }} - {{ end }}{{ now.Year }} {{ .Site.Params.author | default .Site.Title }}</span>
            <span class="separator">&middot;</span>
            <span>Powered by <a href="https://gohugo.io/" target="_blank" rel="noopener">Hugo</a> & <a href="https://github.com/realmnzn/hugo-Atmosphere" target="_blank" rel="noopener">Atmosphere</a></span>
        </div>
        {{ with .Site.Params.icp }}
        <div class="footer-line secondary">
            <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">{{ . }}</a>
        </div>
        {{ end }}
    </div>
</footer>
