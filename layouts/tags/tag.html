{{ define "main" }}
<div class="container">
  <header class="list-header">
    <h1 class="list-title">#{{ .Title }}</h1>
  </header>
  <ul class="post-list archive-list">
    {{ range .Pages }}
    <li class="post-item">
      <a href="{{ .RelPermalink }}" class="post-item-link">{{ .Title }}</a>
      <time class="post-item-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 02, 2006" }}</time>
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}

{{ define "styles" }}
{{ $post := resources.Get "css/post.css" }}
<link rel="stylesheet" href="{{ $post.RelPermalink }}">
{{ end }}
